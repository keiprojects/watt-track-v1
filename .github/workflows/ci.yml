name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck and Expo validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Validate Android bundle export
        run: npm run export:android > android-export.log 2>&1

      - name: Upload Android export log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-export-log
          path: android-export.log

      - name: Report Expo package compatibility
        continue-on-error: true
        run: npx expo install --check
