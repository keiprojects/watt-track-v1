name: Update Gifted Charts lockfile

on:
  push:
    branches:
      - codex/watt-track-ui-revamp

permissions:
  contents: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/watt-track-ui-revamp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and update lockfile
        run: npm install

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Commit generated lockfile and remove temporary workflow
        run: |
          rm .github/workflows/update-gifted-charts-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/update-gifted-charts-lock.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update lockfile for Gifted Charts"
          git push
