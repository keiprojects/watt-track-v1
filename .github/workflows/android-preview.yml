name: Build Android Preview APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    name: Build preview APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build preview APK
        run: |
          mkdir -p build-output
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./build-output/watt-track-preview.apk

      - name: Upload preview APK
        uses: actions/upload-artifact@v4
        with:
          name: watt-track-preview-apk
          path: build-output/watt-track-preview.apk
          retention-days: 14
          if-no-files-found: error
