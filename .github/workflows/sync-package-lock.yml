name: Sync package lock

on:
  push:
    branches:
      - codex/fix-nativewind-lockfile
    paths:
      - .github/workflows/sync-package-lock.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-lockfile:
    name: Regenerate package-lock.json
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: codex/fix-nativewind-lockfile

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.x
          cache: npm

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Verify clean install
        run: npm ci

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Report Expo package compatibility
        continue-on-error: true
        run: npx expo install --check

      - name: Commit regenerated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git rm .github/workflows/sync-package-lock.yml
          git commit -m "Regenerate package lock for NativeWind" || echo "No lockfile changes to commit"
          git push
